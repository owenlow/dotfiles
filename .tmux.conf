# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind '%'

# window titles
set-window-option -g window-status-current-format '#[fg=magenta]( #[fg=white,bold][#{window_index}] #[fg=green]#{pane_current_command} #[fg=cyan]#(pwd="#{pane_current_path}"; echo ${pwd####*/}) #[fg=magenta])'
set-window-option -g window-status-format ' #[fg=colour244,bold][#{window_index}] #[fg=colour244]#{pane_current_command} #[fg=colour244]#(pwd="#{pane_current_path}"; echo ${pwd####*/}) '
set -g status-left ''
set -g status-right '#[fg=colour220,bold]{ #(TZ="Europe/Berlin" date +%%H:%%M) #[fg=colour220,bold]}'
set -g status-bg black
set -g status-fg white

# set to vi mode, sometimes it gets set to emacs mode somehow
set-window-option -g mode-keys vi
